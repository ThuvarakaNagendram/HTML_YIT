<html>
<head>
    <title>Student Register</title>
</head>

<body>

<center>
<h2>Student Registration</h2>

<form>

<table border="0" width="400">

<tr>
<td>Full Name:</td>
</tr>
<tr>
<td><input type="text" name="fullName" size="40"></td>
</tr>

<tr>
<td>Address:</td>
</tr>
<tr>
<td><input type="text" name="address" size="40"></td>
</tr>

<tr>
<td>Email:</td>
</tr>
<tr>
<td><input type="email" name="email" size="40"></td>
</tr>

<tr>
<td>User Name:</td>
</tr>
<tr>
<td><input type="text" name="userName" size="40"></td>
</tr>

<tr>
<td>Password:</td>
</tr>
<tr>
<td><input type="password" name="password" size="40"></td>
</tr>

<tr>
<td>
<b>Courses</b><br>
<input type="radio" name="courses"> Python
<input type="radio" name="courses"> Java
<input type="radio" name="courses"> C#
<input type="radio" name="courses"> Web Design
</td>
</tr>

<tr>
<td>
<b>Travel Mode</b><br>
<input type="checkbox"> Bike
<input type="checkbox"> Bicycle
<input type="checkbox"> Car
<input type="checkbox"> Bus
<input type="checkbox"> Other
</td>
</tr>

<tr>
<td>
Admission Date:<br>
<input type="date">
</td>
</tr>

<tr>
<td>
<input type="submit" value="Submit">
<input type="reset" value="Reset">
</td>
</tr>

</table>

</form>
</center>

</body>
</html>
