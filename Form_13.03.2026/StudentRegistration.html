<html>
	<head>
		<title>Student Register</title>
	</head>

	<body>
		  
		<h2>Student Registration</h2>
		<form width="400">
		<!-- <fieldset> -->
		<legend><h2>Student Details</h2></legend>
			<!--full name-->
			<label for="fullName">Full Name: </label>
			<input type="text" id="fullName" name="fullName"><br>
			<!--address-->
			<br>
			<label for="address">Address: </label>
			<input type="text" id="address" name="address"><br>
			<!--email-->
			<br>
			<label for="email">Email: </label>
			<input type="email" id="email" name="email"><br>
			<!--username-->
			<br>
			<label for="userName">User name: </label>
			<input type="text" id="userName" name="userName"><br>
			<!--password-->
			<br>
			<label for="password">Password: </label>
			<input type="password" id="password" name="password"><br>
			<!--radio buttons-->
			<br>
			<!-- <fieldset> -->
			<legend><b>Courses</b></legend>
			<!-- <label for="courses"><b>Courses</b></label><br> -->
				<input type="radio" name="courses" value="Python">
				<label for="Python">Python</label>
				<input type="radio" name="courses" value="Java">
				<label for="Java">Java</label>
				<input type="radio" name="courses" value="C#">
				<label for="C#">C#</label>
				<input type="radio" name="courses" value="webDesign">
				<label for="webDesign">Web Design</label>
			<!-- </fieldset> -->
			<!--checkbox-->
			<br><br>
			<!-- <fieldset> -->
			<legend><b>Travel mode</b></legend><br>
				<input type="checkbox" id="bike" value="bike">
				<label for="bike">Bike</label>
				<input type="checkbox" id="bicycle" value="bicycle">
				<label for="bicycle">Bicycle</label>
				<input type="checkbox" id="car" value="car">
				<label for="car">Car</label>
				<input type="checkbox" id="bus" value="bus">
				<label for="bus">Bus</label>
				<input type="checkbox" id="other" value="other">
				<label for="other">Other</label>
			<!-- </fieldset> -->
			<!--button-->
			<br><br>
			<input type="button" onClick="alert('Welcome to html forms')" value="Click me">
			
			<!--type colour-->
			<br><br>
			<label for="fvrtClr">Select the colour: </label>
			<input type="color" id="fvrtClr" name="fvrtClr">
			
			<!--typeDate-->
			<br><br>
			<label for="admsnDate">Admission Date: </label>
			<input type="date" id="admsnDate" name="admsnDate">
			
			<!--TypeDateTime-->
			<br><br>
			<label for="birthDayTime">Birth Day Time:</label>
			<input type="datetime-local" id="birthDayTime" name="birthDayTime">
			
			<!--Image-->
			<br><br>
			<input type="image" src="C:\YarlIT\HTML_YIT\Form_13.03.2026\Screenshot 2026-03-13 104711.png" alt="submit" width="100" height="100">
			
			<!--type file-->
			<br><br>
			<label for="file">Select a file:</label>
			<input type="file" id="file" name="file"><br>
			
			
			<!--submit-->
			<br>
			<input type="submit" value="Submit" />
			<!--Reset-->
			<input type="reset" value="Reset"/><br>
			
			<!-- </fieldset> -->
			</form>
			
	  
	</body>
</html>
